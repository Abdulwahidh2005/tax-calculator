name: Tax Calculator Node.js CI & CD
on: 

  workflow_dispatch:
    
jobs:
  build-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [service-a,service-b]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'

      - name: Install dependencies
        working-directory: node/${{ matrix.service }}
        run: npm ci

      - name: Run tests
        working-directory: node/${{ matrix.service }}
        run: npm test --if-present

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test

    strategy:
      matrix:
        service:
          - { name: service-a,docker_name: service-a,path: node/service-a }
          - { name: service-b,docker_name: service-b,path: node/service-b }

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.path }}
          push: true
          tags: ${{secrets.DOCKER_USERNAME}}/${{ matrix.service.docker_name }}:latest

  deploy-aws-eks:
      runs-on: ubuntu-latest
      needs: docker-build-push
      steps:
        - name: Checkout code
          uses: actions/checkout@v6

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v5.1.1
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ap-south-1

        - name: Setup kubectl
          uses: azure/setup-kubectl@v4

        - name: Update Kubeconfig for EKS
          run: |
            aws eks update-kubeconfig --region ap-south-1 --name hello-cluster

        - name: verfiy connection
          run: kubectl get nodes

        - name: Deploy to EKS
          run: |
            kubectl apply -f k8s/aws/service-a
            kubectl apply -f k8s/aws/service-b