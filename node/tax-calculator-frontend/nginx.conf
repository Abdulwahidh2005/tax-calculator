server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Serve the React SPA (client-side routing fallback)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to service-a (in-cluster). /api/price -> http://service-a/price
  # service-a is a ClusterIP Service on port 80 (targetPort 3000).
  location /api/ {
    proxy_pass http://service-a/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
